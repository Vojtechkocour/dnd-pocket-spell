<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        var p = window.location.search.match(/[?&]p=([^&]*)/);
        if (p) {
          var path = '/' + p[1].replace(/~and~/g, '&');
          var query = window.location.search.replace(/[?&]p=[^&]*/, '').replace(/[?&]q=([^&]*)/, '?$1').replace(/^&/, '?');
          window.history.replaceState(null, null, path + query + window.location.hash);
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="D&D Pocket Spell — spell management for D&D 5e 2024" />
    <title>D&D Pocket Spell</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
